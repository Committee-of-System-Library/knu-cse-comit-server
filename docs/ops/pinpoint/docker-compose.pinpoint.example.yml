services:
  pinpoint-hbase:
    container_name: pinpoint-hbase
    image: pinpointdocker/pinpoint-hbase:${PINPOINT_VERSION}
    restart: unless-stopped
    env_file:
      - /opt/docker/env/pinpoint.env
    networks:
      - pinpoint
    environment:
      AGENTINFO_TTL: ${AGENTINFO_TTL}
      AGENTSTATV2_TTL: ${AGENTSTATV2_TTL}
      APPSTATAGGRE_TTL: ${APPSTATAGGRE_TTL}
      APPINDEX_TTL: ${APPINDEX_TTL}
      AGENTLIFECYCLE_TTL: ${AGENTLIFECYCLE_TTL}
      AGENTEVENT_TTL: ${AGENTEVENT_TTL}
      STRINGMETADATA_TTL: ${STRINGMETADATA_TTL}
      APIMETADATA_TTL: ${APIMETADATA_TTL}
      SQLMETADATA_TTL: ${SQLMETADATA_TTL}
      TRACEV2_TTL: ${TRACEV2_TTL}
      APPTRACEINDEX_TTL: ${APPTRACEINDEX_TTL}
      APPMAPSTATCALLERV2_TTL: ${APPMAPSTATCALLERV2_TTL}
      APPMAPSTATCALLEV2_TTL: ${APPMAPSTATCALLEV2_TTL}
      APPMAPSTATSELFV2_TTL: ${APPMAPSTATSELFV2_TTL}
      HOSTAPPMAPV2_TTL: ${HOSTAPPMAPV2_TTL}
    volumes:
      - pinpoint_hbase_data:/home/pinpoint/hbase
    expose:
      - "16010"

  pinpoint-mysql:
    container_name: pinpoint-mysql
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - /opt/docker/env/pinpoint.env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - pinpoint_mysql_data:/var/lib/mysql
    networks:
      - pinpoint

  pinpoint-redis:
    container_name: pinpoint-redis
    image: redis:7.0.14
    restart: unless-stopped
    env_file:
      - /opt/docker/env/pinpoint.env
    command: ["redis-server", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD}"]
    networks:
      - pinpoint

  zoo1:
    container_name: pinpoint-zoo1
    image: zookeeper:3.4.13
    restart: unless-stopped
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888
    networks:
      - pinpoint

  pinot-zoo:
    container_name: pinpoint-pinot-zoo
    image: zookeeper:3.8.0-temurin
    restart: unless-stopped
    networks:
      - pinpoint
    volumes:
      - pinpoint_pinot_zoo_data:/data
      - pinpoint_pinot_zoo_datalog:/datalog

  pinpoint-kafka:
    container_name: pinpoint-kafka
    image: ubuntu/kafka:3.1-22.04_beta
    restart: unless-stopped
    depends_on:
      - pinot-zoo
    command: /etc/kafka/server.properties --override advertised.listeners=PLAINTEXT://pinpoint-kafka:9092
    environment:
      ZOOKEEPER_HOST: pinot-zoo
    networks:
      - pinpoint
    volumes:
      - pinpoint_kafka_data:/var/lib/kafka/data

  pinot-controller:
    container_name: pinpoint-pinot-controller
    image: apachepinot/pinot:1.0.0-11-amazoncorretto
    restart: unless-stopped
    command: StartController -zkAddress pinot-zoo
    depends_on:
      - pinot-zoo
    ports:
      - "127.0.0.1:${PINOT_CONTROLLER_PORT:-9000}:9000"
    networks:
      - pinpoint
    volumes:
      - pinpoint_pinot_controller_data:/tmp/data/controller

  pinot-broker-0:
    container_name: pinpoint-pinot-broker-0
    image: apachepinot/pinot:1.0.0-11-amazoncorretto
    restart: unless-stopped
    command: StartBroker -zkAddress pinot-zoo
    depends_on:
      - pinot-controller
    networks:
      - pinpoint

  pinot-server-0:
    container_name: pinpoint-pinot-server-0
    image: apachepinot/pinot:1.0.0-11-amazoncorretto
    restart: unless-stopped
    command: StartServer -zkAddress pinot-zoo
    depends_on:
      - pinot-broker-0
    networks:
      - pinpoint
    volumes:
      - pinpoint_pinot_server_data:/tmp/data/server

  pinpoint-kafka-init:
    container_name: pinpoint-kafka-init
    image: ubuntu/kafka:3.1-22.04_beta
    restart: "no"
    depends_on:
      - pinpoint-kafka
    entrypoint: >
      sh -c "
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic url-stat --partitions 64 --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic system-metric-data-type --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic system-metric-tag --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic system-metric-double --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic exception-trace --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic inspector-stat-app --partitions 64 --bootstrap-server pinpoint-kafka:9092 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic inspector-stat-agent-00 --partitions 32 --bootstrap-server pinpoint-kafka:9092
      "
    networks:
      - pinpoint

  pinot-init:
    container_name: pinpoint-pinot-init
    image: apachepinot/pinot:1.0.0-11-amazoncorretto
    restart: "no"
    env_file:
      - /opt/docker/env/pinpoint.env
    depends_on:
      - pinot-server-0
      - pinpoint-kafka-init
    entrypoint: >
      sh -c "
      echo 'Pinot schema/table bootstrap commands are intentionally omitted from this template.' &&
      echo 'Use the official pinpoint-docker pinot-init script for the exact version.'
      "
    networks:
      - pinpoint

  pinpoint-collector:
    container_name: pinpoint-collector
    image: pinpointdocker/pinpoint-collector:${PINPOINT_VERSION}-metric
    restart: unless-stopped
    env_file:
      - /opt/docker/env/pinpoint.env
    depends_on:
      - pinpoint-hbase
      - pinpoint-kafka-init
      - pinot-init
      - pinpoint-redis
      - zoo1
    environment:
      SPRING_PROFILES_ACTIVE: local,metric
      PINPOINT_ZOOKEEPER_ADDRESS: ${PINPOINT_ZOOKEEPER_ADDRESS}
      CLUSTER_ENABLE: ${CLUSTER_ENABLE}
      LOGGING_LEVEL_ROOT: ${COLLECTOR_LOGGING_LEVEL_ROOT}
      FLINK_CLUSTER_ENABLE: ${FLINK_CLUSTER_ENABLE}
      FLINK_CLUSTER_ZOOKEEPER_ADDRESS: ${FLINK_CLUSTER_ZOOKEEPER_ADDRESS}
      PINPOINT_PINOT_JDBC_URL: ${SPRING_PINOTDATASOURCE_PINOT_JDBCURL}
      PINPOINT_PINOT_JDBC_USERNAME: ${SPRING_PINOTDATASOURCE_PINOT_USERNAME}
      PINPOINT_PINOT_JDBC_PASSWORD: ${SPRING_PINOTDATASOURCE_PINOT_PASSWORD}
      SPRING_PINOTDATASOURCE_PINOT_JDBCURL: ${SPRING_PINOTDATASOURCE_PINOT_JDBCURL}
      SPRING_PINOTDATASOURCE_PINOT_USERNAME: ${SPRING_PINOTDATASOURCE_PINOT_USERNAME}
      SPRING_PINOTDATASOURCE_PINOT_PASSWORD: ${SPRING_PINOTDATASOURCE_PINOT_PASSWORD}
      PINPOINT_METRIC_KAFKA_BOOTSTRAP_SERVERS: ${PINPOINT_METRIC_KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_USERNAME: ${SPRING_DATA_REDIS_USERNAME}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
    ports:
      - "${COLLECTOR_RECEIVER_GRPC_AGENT_PORT:-9991}:9991/tcp"
      - "${COLLECTOR_RECEIVER_GRPC_STAT_PORT:-9992}:9992/tcp"
      - "${COLLECTOR_RECEIVER_GRPC_SPAN_PORT:-9993}:9993/tcp"
    networks:
      pinpoint:
        ipv4_address: ${COLLECTOR_FIXED_IP}

  pinpoint-web:
    container_name: pinpoint-web
    image: pinpointdocker/pinpoint-web:${PINPOINT_VERSION}-metric
    restart: unless-stopped
    env_file:
      - /opt/docker/env/pinpoint.env
    depends_on:
      - pinpoint-hbase
      - pinpoint-mysql
      - pinpoint-kafka-init
      - pinot-init
      - pinpoint-redis
      - zoo1
    environment:
      WEB_SERVER_PORT: ${WEB_SERVER_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES},metric
      PINPOINT_ZOOKEEPER_ADDRESS: ${PINPOINT_ZOOKEEPER_ADDRESS}
      CLUSTER_ENABLE: ${CLUSTER_ENABLE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CONFIG_SENDUSAGE: ${CONFIG_SENDUSAGE}
      LOGGING_LEVEL_ROOT: ${WEB_LOGGING_LEVEL_ROOT}
      CONFIG_SHOW_APPLICATIONSTAT: ${CONFIG_SHOW_APPLICATIONSTAT}
      JDBC_DRIVERCLASSNAME: ${JDBC_DRIVERCLASSNAME}
      JDBC_URL: ${SPRING_DATASOURCE_HIKARI_JDBCURL}
      JDBC_USERNAME: ${SPRING_DATASOURCE_HIKARI_USERNAME}
      JDBC_PASSWORD: ${SPRING_DATASOURCE_HIKARI_PASSWORD}
      PINPOINT_PINOT_JDBC_URL: ${SPRING_PINOTDATASOURCE_PINOT_JDBCURL}
      PINPOINT_PINOT_JDBC_USERNAME: ${SPRING_PINOTDATASOURCE_PINOT_USERNAME}
      PINPOINT_PINOT_JDBC_PASSWORD: ${SPRING_PINOTDATASOURCE_PINOT_PASSWORD}
      SPRING_DATASOURCE_HIKARI_JDBCURL: ${SPRING_DATASOURCE_HIKARI_JDBCURL}
      SPRING_DATASOURCE_HIKARI_USERNAME: ${SPRING_DATASOURCE_HIKARI_USERNAME}
      SPRING_DATASOURCE_HIKARI_PASSWORD: ${SPRING_DATASOURCE_HIKARI_PASSWORD}
      SPRING_METADATASOURCE_HIKARI_JDBCURL: ${SPRING_METADATASOURCE_HIKARI_JDBCURL}
      SPRING_METADATASOURCE_HIKARI_USERNAME: ${SPRING_METADATASOURCE_HIKARI_USERNAME}
      SPRING_METADATASOURCE_HIKARI_PASSWORD: ${SPRING_METADATASOURCE_HIKARI_PASSWORD}
      SPRING_PINOTDATASOURCE_PINOT_JDBCURL: ${SPRING_PINOTDATASOURCE_PINOT_JDBCURL}
      SPRING_PINOTDATASOURCE_PINOT_USERNAME: ${SPRING_PINOTDATASOURCE_PINOT_USERNAME}
      SPRING_PINOTDATASOURCE_PINOT_PASSWORD: ${SPRING_PINOTDATASOURCE_PINOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_USERNAME: ${SPRING_DATA_REDIS_USERNAME}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      PINPOINT_MODULES_WEB_LOGIN: ${PINPOINT_MODULES_WEB_LOGIN}
      WEB_SECURITY_AUTH_USER: ${WEB_SECURITY_AUTH_USER}
      WEB_SECURITY_AUTH_ADMIN: ${WEB_SECURITY_AUTH_ADMIN}
      WEB_SECURITY_AUTH_JWT_SECRETKEY: ${WEB_SECURITY_AUTH_JWT_SECRETKEY}
    ports:
      - "127.0.0.1:${WEB_SERVER_PORT:-18080}:8080"
    networks:
      - pinpoint

networks:
  pinpoint:
    driver: bridge
    ipam:
      config:
        - subnet: ${PINPOINT_NETWORK_SUBNET}

volumes:
  pinpoint_hbase_data:
  pinpoint_mysql_data:
  pinpoint_pinot_zoo_data:
  pinpoint_pinot_zoo_datalog:
  pinpoint_pinot_server_data:
  pinpoint_pinot_controller_data:
  pinpoint_kafka_data:
