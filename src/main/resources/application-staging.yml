server:
  forward-headers-strategy: framework

spring:
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}

logging:
  file:
    name: ${LOG_FILE_PATH:/app/logs/app-staging.log}

comit:
  auth:
    bridge:
      enabled: ${COMIT_AUTH_BRIDGE_ENABLED:true}
    sso:
      enabled: ${COMIT_AUTH_SSO_ENABLED:false}
      frontend-success-url: ${COMIT_AUTH_SSO_FRONTEND_SUCCESS_URL:https://chcse.knu.ac.kr/comit-staging}
      cookie-path: ${COMIT_AUTH_SSO_COOKIE_PATH:/}
