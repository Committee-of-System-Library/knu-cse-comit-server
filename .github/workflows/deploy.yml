name: Continuous Integration / Continuous Deployment

concurrency:
  group: production
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    
permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  ORG: committee-of-system-library
  IMAGE_NAME: comit-be
  CONT_NAME: comit_BE

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
    - uses: actions/checkout@v4

    - name: Setting up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Getting current date
      id: getDate
      run: echo "date=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

    - name: Caching Gradle files
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Granting execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Building with Gradle
      run: ./gradlew clean build -x test

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin
      
    - name: Building the image
      run: |
        docker build \
        -t $REGISTRY/$ORG/$IMAGE_NAME:latest \
        -t $REGISTRY/$ORG/$IMAGE_NAME:${{ steps.getDate.outputs.date }} \
        .

    - name: Pushing the image to GHCR
      run: |
        docker push $REGISTRY/$ORG/$IMAGE_NAME:latest
        docker push $REGISTRY/$ORG/$IMAGE_NAME:${{ steps.getDate.outputs.date }}