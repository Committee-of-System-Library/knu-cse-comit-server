name: CI/CD

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    
permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  ORG: committee-of-system-library
  IMAGE_NAME: knu-cse-comit-server

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Run tests
      run: ./gradlew test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Get current date
      id: getDate
      run: echo "date=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

    - name: Cache Gradle files
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew clean build

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin
      
    - name: Build and push image
      run: |
        docker build \
          -t $REGISTRY/$ORG/$IMAGE_NAME:latest \
          -t $REGISTRY/$ORG/$IMAGE_NAME:${{ steps.getDate.outputs.date }} \
          .
        docker push $REGISTRY/$ORG/$IMAGE_NAME --all-tags

  deploy:
    needs: build-and-push
    runs-on: [ 'self-hosted', 'backend' ]
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Pull and restart
        run: |
          docker pull $REGISTRY/$ORG/$IMAGE_NAME:latest
          docker compose -f /opt/docker/compose/docker-compose.services.yml up -d knu-cse-comit-server

      - name: Cleanup
        run: docker image prune -f
